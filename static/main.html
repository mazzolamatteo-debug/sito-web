<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Milano</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">

    <style>
        #map {
            height: 450px;
            width: 100%;
            margin: 20px 0;
            border: 2px solid #333;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Dashboard Milano</h1>

    <!-- ORA -->
    <button id="btn-ora">Ora Server</button>
    <span id="orario"></span>

    <!-- SALUTO -->
    <div>
        <input id="input-nome" placeholder="Nome">
        <button id="btn-saluto">Saluta</button>
        <p id="risposta-saluto"></p>
    </div>

    <!-- RICERCA -->
    <h3>Cerca Fontanelle</h3>
    <input id="input-nil" placeholder="Quartiere">
    <button id="btn-cerca">Cerca</button>

    <div id="map"></div>

    <p id="info-risultati"></p>

    <table id="tabella-fontanelle" style="display:none; width:100%;">
        <thead>
        <tr>
            <th>ID</th>
            <th>NIL</th>
            <th>Municipio</th>
        </tr>
        </thead>
        <tbody id="corpo-tabella"></tbody>
    </table>

    <!-- 🔢 CONTA FONTANELLE -->
    <h3>Statistiche</h3>
    <button id="btn-conta">Conta Fontanelle per Quartiere</button>

    <p id="info-conteggi"></p>

    <table id="tabella-conteggi" style="display:none; width:100%;">
        <thead>
        <tr>
            <th>Quartiere</th>
            <th>Totale</th>
        </tr>
        </thead>
        <tbody id="corpo-conteggi"></tbody>
    </table>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/script.js"></script>
</body>
</html>
